<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut · RFID System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f;--surf:#0d0d1a;--card:#111120;--border:#1c1c2e;
      --a1:#c8ff00;--a2:#ff3cac;--a3:#00d4ff;
      --txt:#e6e6f0;--muted:#60607a;--r:14px;
      --success:#00e676;--danger:#ff1744;--warn:#ffab00;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);background:var(--bg);overflow:hidden;touch-action:manipulation;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .app{display:flex;height:100vh;height:100dvh;}
    .sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .topbar{height:52px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
    .page{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}
    .s-logo{padding:18px 16px;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;border-bottom:1px solid var(--border);}
    .s-logo small{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:10px;color:var(--a3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;}
    .logo-dot{color:var(--a1);}
    .s-nav{flex:1;padding:10px 0;overflow-y:auto;}
    .s-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;color:var(--muted);font-size:14px;border-left:3px solid transparent;transition:all .15s;user-select:none;}
    .s-item:active{background:rgba(255,255,255,.05);}
    .s-item.active{color:var(--a1);border-left-color:var(--a1);background:rgba(200,255,0,.05);}
    .s-item .icon{font-size:18px;width:24px;text-align:center;}
    .s-sec{padding:14px 16px 6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
    .s-bottom{padding:12px 16px;border-top:1px solid var(--border);}
    .s-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
    .s-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .s-status-dot.on{background:var(--success);box-shadow:0 0 8px rgba(0,230,118,.5);}
    .s-status-dot.off{background:var(--danger);}
    .tb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .tb-event{font-size:12px;color:var(--a3);padding:4px 10px;border-radius:6px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);}
    .tb-user{font-size:12px;color:var(--muted);}
    .burger{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;padding:4px;}
    .nfc-scan{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
    .nfc-ring{width:180px;height:180px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;transition:all .3s;}
    .nfc-ring.scanning{border-color:var(--a3);animation:nfcPulse 2s ease-in-out infinite;}
    .nfc-ring.success{border-color:var(--success);background:rgba(0,230,118,.06);}
    .nfc-ring.error{border-color:var(--danger);background:rgba(255,23,68,.06);}
    .nfc-ring .emoji{font-size:52px;}
    .nfc-label{margin-top:16px;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
    .nfc-sub{color:var(--muted);font-size:13px;margin-top:6px;}
    @keyframes nfcPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.3)}50%{box-shadow:0 0 0 20px rgba(0,212,255,0)}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
    .card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
    .stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;}
    .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:all .12s;user-select:none;min-height:48px;white-space:nowrap;}
    .btn:active{transform:scale(.96);opacity:.85;}
    .btn-p{background:var(--a1);color:#000;}
    .btn-danger{background:rgba(255,23,68,.12);color:var(--danger);border:1px solid rgba(255,23,68,.2);}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-g:active{border-color:var(--a1);color:var(--a1);}
    .btn-full{width:100%;}
    .btn-lg{padding:18px 32px;font-size:17px;border-radius:14px;min-height:56px;}
    .topup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
    .topup-btn{padding:20px;border-radius:14px;background:var(--card);border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
    .topup-btn:active,.topup-btn.selected{border-color:var(--a1);background:rgba(200,255,0,.06);}
    .topup-btn .amount{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--a1);}
    .pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
    .pos-item{padding:16px 12px;border-radius:12px;background:var(--card);border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .12s;user-select:none;position:relative;}
    .pos-item:active{transform:scale(.95);}
    .pos-item.in-cart{border-color:var(--a1);background:rgba(200,255,0,.06);}
    .pos-item .p-name{font-size:14px;font-weight:500;margin-bottom:6px;}
    .pos-item .p-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--a1);}
    .cart-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04);}
    .cart-row:last-of-type{border-bottom:none;}
    .cart-total{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--a1);}
    .form-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
    .form-input,.form-select{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:14px;min-height:48px;}
    .form-input:focus,.form-select:focus{border-color:var(--a1);}
    .result-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:500;animation:fadeIn .2s ease;}
    .result-overlay.success{background:rgba(0,230,118,.12);}
    .result-overlay.error{background:rgba(255,23,68,.12);}
    .result-box{text-align:center;padding:40px;border-radius:20px;background:var(--card);border:2px solid;min-width:300px;}
    .result-box.success{border-color:var(--success);}
    .result-box.error{border-color:var(--danger);}
    .result-emoji{font-size:64px;margin-bottom:16px;}
    .result-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
    .result-sub{font-size:15px;color:var(--muted);}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 50% 35% at 50% 0%,rgba(200,255,0,.07) 0%,transparent 60%);}
    .login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;}
    .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:4px;}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
    .b-green{background:rgba(0,230,118,.12);color:var(--success);}
    .b-red{background:rgba(255,23,68,.12);color:var(--danger);}
    .b-blue{background:rgba(0,212,255,.12);color:var(--a3);}
    .b-gray{background:rgba(107,107,136,.15);color:var(--muted);}
    .b-yellow{background:rgba(255,171,0,.12);color:var(--warn);}
    .balance-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--a1);text-align:center;line-height:1;}
    .balance-label{text-align:center;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
    .access-full{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:600;animation:fadeIn .15s ease;gap:12px;}
    .access-full.granted{background:rgba(0,40,10,.96);}
    .access-full.denied{background:rgba(50,0,0,.96);}
    .access-text{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;text-align:center;padding:0 24px;}
    .access-sub{font-size:16px;color:rgba(255,255,255,.5);text-align:center;}
    .access-balance{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--a1);}
    .access-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
    .acc-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
    .acc-stat .val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
    .acc-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
    .acc-log{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .acc-log-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    .acc-log-item:last-child{border-bottom:none;}
    .acc-dir{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .acc-dir.in{background:rgba(0,230,118,.12);}
    .acc-dir.out{background:rgba(0,212,255,.12);}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    .mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}
    .tbl-wrap{overflow-x:auto;border-radius:10px;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:14px;z-index:1000;transition:transform .3s;white-space:nowrap;font-weight:500;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    /* ── MODAL INTEGRADO (reemplaza prompt/confirm nativos) ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:900;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}

    /* PIN pad dentro del modal */
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:16px 0;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
    .pin-dot.filled{background:var(--a1);border-color:var(--a1);}
    .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
    .pin-key{padding:16px;border-radius:12px;background:var(--surf);border:1px solid var(--border);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;cursor:pointer;text-align:center;transition:background .1s;user-select:none;}
    .pin-key:active{background:rgba(200,255,0,.1);}
    .pin-key.empty{opacity:0;pointer-events:none;}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;height:100%;z-index:300;transform:translateX(-100%);transition:transform .25s;width:260px;}
      .sidebar.open{transform:translateX(0);}
      .burger{display:flex!important;}
      .g2,.g3,.access-stats{grid-template-columns:1fr;}
      .balance-big{font-size:40px;}
      .nfc-ring{width:140px;height:140px;}
      .nfc-ring .emoji{font-size:40px;}
      .topup-btn .amount{font-size:22px;}
    }
    @media(min-width:769px){.burger{display:none;}}
  </style>
</head>
<body>
<div id="toast"></div>

<!-- ══ MODAL UNIVERSAL (reemplaza prompt/confirm/alert) ══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">InOut<span class="logo-dot">.</span></div>
    <div class="login-sub">RFID & Cashless System</div>
    <div id="login-error" style="display:none;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px"></div>
    <label class="form-lbl">Email</label>
    <input class="form-input" id="login-email" type="email" placeholder="tu@inoutmedia.es" autocomplete="email"/>
    <label class="form-lbl">Contraseña</label>
    <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn btn-p btn-full btn-lg" onclick="doLogin()">Entrar</button>
    <div style="margin-top:12px;text-align:center;font-size:12px;color:var(--muted)">Solo personal autorizado</div>
  </div>
</div>

<div id="app" style="display:none" class="app">
  <aside class="sidebar" id="sidebar">
    <div class="s-logo">InOut<span class="logo-dot">.</span><small>RFID System</small></div>
    <div class="s-nav" id="s-nav"></div>
    <div class="s-bottom">
      <div class="s-status"><span class="s-status-dot" id="nfc-status-dot"></span><span id="nfc-status-text">NFC: Detectando...</span></div>
      <div style="margin-top:10px"><button class="btn btn-g btn-full" style="padding:8px;font-size:12px" onclick="doLogout()">Cerrar sesión</button></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="burger" onclick="toggleSidebar()">☰</button>
      <span class="tb-title" id="tb-title">—</span>
      <div class="tb-right">
        <span class="tb-event" id="tb-event">Sin evento</span>
        <span class="tb-user" id="tb-user">—</span>
      </div>
    </div>
    <div class="page" id="page-content"></div>
  </div>
</div>
<div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250" onclick="closeSidebar()"></div>
<script>
// ══════════════════════════════════════════════════════════════════
//  MÓDULO PIN DE DISPOSITIVO — se inyecta en Staff/Register/Kiosk/Valid
//  PIN se pide UNA sola vez por sesión de app (hasta cerrar pestaña)
//  Se guarda en sessionStorage (se borra al cerrar) NO en localStorage
// ══════════════════════════════════════════════════════════════════
const DEVICE_PIN = '1234'; // ← cambiar en producción
const _DEVICE_PIN_KEY = 'inout_device_unlocked';

function isDeviceUnlocked(){
  return sessionStorage.getItem(_DEVICE_PIN_KEY) === 'yes';
}

function lockDevice(){
  sessionStorage.removeItem(_DEVICE_PIN_KEY);
}

// Muestra la pantalla de PIN bloqueando toda la UI hasta que sea correcto
// onUnlock: función a llamar cuando el PIN sea correcto
function showDeviceLockScreen(appName, appIcon, onUnlock){
  // Si ya está desbloqueado, ir directo
  if(isDeviceUnlocked()){ onUnlock(); return; }

  let _buf = '';
  const overlay = document.createElement('div');
  overlay.id = 'device-lock-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:var(--bg,#07070f);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;padding:24px;font-family:'DM Sans',sans-serif;
  `;
  overlay.innerHTML = `
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:52px;margin-bottom:10px">${appIcon}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#e6e6f0">
        InOut<span style="color:#c8ff00">.</span>
      </div>
      <div style="font-size:11px;color:#60607a;text-transform:uppercase;letter-spacing:2px;margin-top:3px">${appName}</div>
    </div>
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:#e6e6f0;margin-bottom:4px">PIN de dispositivo</div>
    <div style="font-size:13px;color:#60607a;margin-bottom:20px">Introduce el PIN para desbloquear</div>
    <div id="dl-dots" style="display:flex;gap:14px;justify-content:center;margin-bottom:24px">
      ${[0,1,2,3].map(i=>`<div id="dld${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid #1c1c2e;transition:all .15s"></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
        k===''
        ? '<div></div>'
        : `<div id="dlk-${k}" style="padding:18px;border-radius:14px;background:#0d0d1a;border:1px solid #1c1c2e;
               font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#e6e6f0;
               text-align:center;cursor:pointer;user-select:none;transition:background .1s" 
               onclick="dlKey('${k}')">${k}</div>`
      ).join('')}
    </div>
    <div id="dl-err" style="height:18px;margin-top:14px;font-size:13px;color:#ff1744;text-align:center"></div>
  `;
  document.body.appendChild(overlay);

  window.dlKey = function(k){
    if(k==='⌫'){ _buf=_buf.slice(0,-1); }
    else if(_buf.length<4){ _buf+=k; }
    // Actualizar dots
    for(let i=0;i<4;i++){
      const d=document.getElementById('dld'+i);
      if(d){ d.style.background=i<_buf.length?'#c8ff00':'transparent'; d.style.borderColor=i<_buf.length?'#c8ff00':'#1c1c2e'; }
    }
    if(_buf.length===4){
      setTimeout(()=>{
        if(_buf===DEVICE_PIN){
          sessionStorage.setItem(_DEVICE_PIN_KEY,'yes');
          overlay.style.transition='opacity .3s';
          overlay.style.opacity='0';
          setTimeout(()=>{ overlay.remove(); delete window.dlKey; onUnlock(); }, 300);
        } else {
          _buf='';
          for(let i=0;i<4;i++){const d=document.getElementById('dld'+i);if(d){d.style.background='transparent';d.style.borderColor='#ff1744';}}
          document.getElementById('dl-err').textContent='PIN incorrecto';
          // Shake
          overlay.style.transition='transform .08s';
          overlay.style.transform='translateX(10px)';
          setTimeout(()=>overlay.style.transform='translateX(-10px)',80);
          setTimeout(()=>overlay.style.transform='translateX(5px)',160);
          setTimeout(()=>{overlay.style.transform='translateX(0)';for(let i=0;i<4;i++){const d=document.getElementById('dld'+i);if(d)d.style.borderColor='#1c1c2e';}},240);
          setTimeout(()=>document.getElementById('dl-err').textContent='',2000);
        }
      },150);
    }
  };
}

const SB_URL = 'https://raoxkjnwrccoxjcipfpv.supabase.co';
const SB_KEY = 'sb_publishable__-K1pC4bOJHRf8JQ__OOzg_jqLxlGla';
const _sb    = supabase.createClient(SB_URL, SB_KEY);

let currentUser=null, userProfile=null, currentPage='pos';
let selectedEvent=null, allEvents=[];
let posProducts=[], posCart={}, allPOS=[];
let nfcReader=null, nfcSupported=false, lastScannedUID=null;

let _lastScanUID=null, _lastScanTS=0;
function isDuplicateScan(uid){
  const now=Date.now();
  if(uid===_lastScanUID && now-_lastScanTS<3000) return true;
  _lastScanUID=uid; _lastScanTS=now; return false;
}

async function submitAddProduct(){
  const nombre = document.getElementById('mp-nombre')?.value?.trim();
  const precio = parseFloat(document.getElementById('mp-precio')?.value);
  const cat    = document.getElementById('mp-cat')?.value || 'General';
  const err    = document.getElementById('modal-err');
  if(!nombre){ err.textContent='El nombre es obligatorio'; err.style.display='block'; return; }
  if(!precio || precio <= 0){ err.textContent='Introduce un precio válido'; err.style.display='block'; return; }
  const btn = document.querySelector('#modal-box .btn-p');
  if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const{error}=await _sb.from('rfid_products').insert({
    event_id: selectedEvent?.id, name: nombre, price: precio,
    category: cat, active: true, sort_order: posProducts.length
  });
  if(error){ err.textContent='Error: '+error.message; err.style.display='block'; if(btn){btn.disabled=false;btn.textContent='Añadir producto';} return; }
  closeModal();
  toast(`"${nombre}" añadido ✓`);
  await loadProducts();
  renderProducts(document.getElementById('page-content'));
}

let _pinAdminBuffer = '';
function modalAdminPIN(title, subtitle, onSuccess){
  _pinAdminBuffer = '';
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-title">${title||'🔒 PIN de administrador'}</div>
    <div class="modal-sub">${subtitle||'Introduce el PIN para continuar'}</div>
    <div class="pin-dots" id="adm-pin-dots">
      <div class="pin-dot" id="admpd0"></div>
      <div class="pin-dot" id="admpd1"></div>
      <div class="pin-dot" id="admpd2"></div>
      <div class="pin-dot" id="admpd3"></div>
    </div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9,'empty',0,'⌫'].map(k=>
        k==='empty'
          ? '<div class="pin-key empty"></div>'
          : `<div class="pin-key" onclick="adminPinKey('${k}')">${k}</div>`
      ).join('')}
    </div>
    <button class="btn btn-g btn-full" style="margin-top:14px;font-size:13px" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modal-overlay').classList.add('show');
  // Guardar callback
  window._adminPinCallback = onSuccess;
}

function adminPinKey(k){
  if(k==='⌫'){ _pinAdminBuffer=_pinAdminBuffer.slice(0,-1); }
  else if(_pinAdminBuffer.length < 4){ _pinAdminBuffer += k; }
  // Actualizar dots
  for(let i=0;i<4;i++){
    const d=document.getElementById('admpd'+i);
    if(d){ d.className='pin-dot'+(i<_pinAdminBuffer.length?' filled':''); }
  }
  if(_pinAdminBuffer.length === 4){
    setTimeout(()=>{
      if(_pinAdminBuffer === '0607'){
        closeModal();
        if(window._adminPinCallback) window._adminPinCallback();
        window._adminPinCallback = null;
      } else {
        _pinAdminBuffer = '';
        for(let i=0;i<4;i++){const d=document.getElementById('admpd'+i);if(d)d.className='pin-dot';}
        // Shake
        const box = document.getElementById('modal-box');
        if(box){
          box.style.transition='transform .08s';
          box.style.transform='translateX(8px)';
          setTimeout(()=>box.style.transform='translateX(-8px)',80);
          setTimeout(()=>box.style.transform='translateX(4px)',160);
          setTimeout(()=>box.style.transform='translateX(0)',240);
        }
        toast('⛔ PIN incorrecto');
      }
    }, 150);
  }
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  err.style.display='none';
  if(!email||!pass){err.textContent='Introduce email y contraseña';err.style.display='block';return;}
  try{
    const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
    if(error) throw error;
    currentUser=data.user;
    const{data:p}=await _sb.from('empleados').select('*').eq('auth_user_id',currentUser.id).single();
    if(!p){err.textContent='Perfil no encontrado';err.style.display='block';await _sb.auth.signOut();return;}
    userProfile={nombre:p.nombre,role:p.role,email:p.email,id:p.id};
    enterApp();
  }catch(e){
    err.textContent=e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message;
    err.style.display='block';
  }
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogout(){
  await _sb.auth.signOut();
  currentUser=null; userProfile=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  closeSidebar();
}

    dashboard:renderDashboard, products:renderProducts, config:renderConfig

async function initNFC(){
  const dot=document.getElementById('nfc-status-dot');
  const txt=document.getElementById('nfc-status-text');
  if(!('NDEFReader' in window)){
    nfcSupported=false; dot.className='s-status-dot off'; txt.textContent='NFC: No disponible'; return;
  }
  nfcSupported=true;
  try{
    nfcReader=new NDEFReader();
    await nfcReader.scan();
    nfcReader.onreading      = ev => handleNFCScan(ev.serialNumber.replace(/:/g,'').toUpperCase());
    nfcReader.onreadingerror = ()  => toast('Error leyendo NFC');
    dot.className='s-status-dot on'; txt.textContent='NFC: Activo';
  }catch(e){
    dot.className='s-status-dot off'; txt.textContent='NFC: Permiso denegado'; nfcSupported=false;
  }
}

function handleNFCScan(uid){
  if(isDuplicateScan(uid)) return;
  lastScannedUID=uid;
  if(navigator.vibrate) navigator.vibrate(100);
  if(currentPage==='pos')          onPOSScan(uid);
  else if(currentPage==='topup')   onTopupScan(uid);
  else if(currentPage==='register')onRegisterScan(uid);
  else if(currentPage==='access')  onAccessScan(uid);
  else if(currentPage==='balance') onBalanceScan(uid);
  else toast('UID: '+uid);
}

function addToCart(id){posCart[id]=(posCart[id]||0)+1;updateCartUI();}
function removeFromCart(id){if(posCart[id])posCart[id]--;if(posCart[id]<=0)delete posCart[id];updateCartUI();}
function clearCart(){posCart={};updateCartUI();document.getElementById('pos-scan-area').style.display='none';document.getElementById('pos-cart-card').style.display='block';}
function getCartTotal(){let t=0;for(const[id,qty]of Object.entries(posCart)){const p=posProducts.find(x=>x.id===id);if(p)t+=p.price*qty;}return t;}

function updateCartUI(){
  const items=document.getElementById('pos-cart-items');
  const totalEl=document.getElementById('pos-cart-total');
  const entries=Object.entries(posCart).filter(([,q])=>q>0);
  if(!entries.length){
    items.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Selecciona productos</div>';
    totalEl.textContent='0,00€'; return;
  }
  items.innerHTML=entries.map(([id,qty])=>{
    const p=posProducts.find(x=>x.id===id); if(!p)return'';
    return `<div class="cart-row"><div style="display:flex;align-items:center;gap:10px"><button class="btn btn-g" style="width:32px;height:32px;min-height:32px;font-size:16px;padding:0;border-radius:8px" onclick="removeFromCart('${id}')">−</button><span>${p.name} ×${qty}</span></div><span style="font-weight:600;color:var(--a1)">${fmt(p.price*qty)}€</span></div>`;
  }).join('');
  totalEl.textContent=fmt(getCartTotal())+'€';
  document.querySelectorAll('.pos-item').forEach(el=>el.classList.remove('in-cart'));
  for(const id of Object.keys(posCart)) document.getElementById('pos-p-'+id)?.classList.add('in-cart');
}

function startPOSCharge(){
  const t=getCartTotal();
  if(t<=0){toast('Añade productos primero');return;}
  document.getElementById('pos-cart-card').style.display='none';
  document.getElementById('pos-scan-area').style.display='flex';
  document.getElementById('pos-scan-sub').textContent=`Total: ${fmt(t)}€ — Esperando pulsera...`;
}

function cancelPOSCharge(){
  document.getElementById('pos-scan-area').style.display='none';
  document.getElementById('pos-cart-card').style.display='block';
}

async function onPOSScan(uid){
  const scanArea=document.getElementById('pos-scan-area');
  if(!scanArea||scanArea.style.display==='none') return;
  const total=getCartTotal(); if(total<=0)return;
  const ring=document.getElementById('pos-nfc-ring');
  const sub=document.getElementById('pos-scan-sub');
  ring.className='nfc-ring'; sub.textContent='Procesando...';

  const{data:wb}=await _sb.from('rfid_wristbands').select('*').eq('uid',uid).single();
  if(!wb){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='❌';sub.textContent='Pulsera no registrada';setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='📡';sub.textContent=`Total: ${fmt(total)}€ — Esperando pulsera...`;},2000);return;}
  if(wb.status!=='active'){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='🚫';sub.textContent='Pulsera bloqueada';setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='📡';sub.textContent=`Total: ${fmt(total)}€ — Esperando pulsera...`;},2000);return;}
  if(parseFloat(wb.balance)<total){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='💸';sub.textContent=`Saldo insuficiente: ${fmt(wb.balance)}€ (necesita ${fmt(total)}€)`;if(navigator.vibrate)navigator.vibrate([200,100,200]);setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='📡';sub.textContent=`Total: ${fmt(total)}€ — Esperando pulsera...`;},3000);return;}

  const newBal=parseFloat(wb.balance)-total;
  const desc=Object.entries(posCart).map(([id,qty])=>{const p=posProducts.find(x=>x.id===id);return p?p.name+' x'+qty:'';}).filter(Boolean).join(', ');
  await _sb.from('rfid_wristbands').update({balance:newBal,total_spent:parseFloat(wb.total_spent||0)+total,last_used_at:new Date().toISOString()}).eq('id',wb.id);
  await _sb.from('rfid_transactions').insert({wristband_id:wb.id,event_id:selectedEvent?.id,type:'purchase',amount:-total,balance_after:newBal,description:desc,point_of_sale:'POS',operator:userProfile.nombre,payment_method:'cashless'});
  showResult('success','✅','Cobrado: '+fmt(total)+'€','Saldo restante: '+fmt(newBal)+'€ · '+(wb.holder_name||''));
  posCart={};
  setTimeout(()=>{hideResult();cancelPOSCharge();updateCartUI();},2500);
}

function checkTopupPayment(){
  const sumupId=sessionStorage.getItem('topup_sumup_id');
  const wbId=sessionStorage.getItem('topup_wristband_id');
  const amount=sessionStorage.getItem('topup_amount');
  const ref=sessionStorage.getItem('topup_ref');
  if(!sumupId||!wbId)return;
  const el=document.getElementById('topup-verify-status');
  if(el)el.innerHTML='🔄 Verificando...';
  fetch(`https://inout-api.vercel.app/api/rfid/verify-topup?wristband=${wbId}&amount=${amount}&ref=${ref}&sumup_id=${sumupId}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.status==='completed'||data.status==='already_completed'){
      if(topupCheckInterval){clearInterval(topupCheckInterval);topupCheckInterval=null;}
      ['topup_sumup_id','topup_wristband_id','topup_amount','topup_ref'].forEach(k=>sessionStorage.removeItem(k));
      showResult('success','💰','+'+fmt(parseFloat(amount))+'€ recargados','Nuevo saldo: '+fmt(data.balance)+'€ · '+(data.holder_name||''));
      topupWristband=null;topupAmount=0;
      setTimeout(()=>{hideResult();renderTopup(document.getElementById('page-content'));},2500);
    }else{
      if(el)el.innerHTML='⏳ Pago pendiente ('+(data.sumup_status||'procesando')+')<br><span style="font-size:12px;color:var(--muted)">Se verifica cada 5 seg.</span>';
    }
  })
  .catch(()=>{if(el)el.textContent='⚠️ Error verificando. Reintenta.';});
}

function cancelSumUpPayment(){
  if(topupCheckInterval){clearInterval(topupCheckInterval);topupCheckInterval=null;}

// Para la pantalla de gestión: todas las instancias del evento (activas e inactivas)
async function loadAllProductsForEvent(){
  if(!selectedEvent) return [];
  // Intentar con JOIN al catálogo; si falla (tabla no existe) hacer query simple
  try {
    const{data, error}=await _sb.from('rfid_products')
      .select('*, rfid_products_catalog(name,category)')
      .eq('event_id',selectedEvent.id)
      .order('sort_order');
    if(error) throw error;
    return (data||[]).map(p=>({
      ...p,
      name:     p.rfid_products_catalog?.name     || p.name     || '—',
      category: p.rfid_products_catalog?.category || p.category || '—',
      stock:    p.stock || 0,
      active:   p.active !== false, // default true si null
    }));
  } catch(e) {
    // Fallback: query simple sin JOIN (catálogo no existe aún)
    const{data}=await _sb.from('rfid_products')
      .select('*')
      .eq('event_id',selectedEvent.id)
      .order('sort_order,name');
    return (data||[]).map(p=>({
      ...p,
      stock:  p.stock  || 0,
      active: p.active !== false,
    }));
  }
}

// Asegura que todos los productos del catálogo tienen una instancia en el evento
async function syncCatalogToEvent(eventId){
  if(!eventId) return;
  try {
    const[{data:catalog, error:catErr},{data:existing}]=await Promise.all([
      _sb.from('rfid_products_catalog').select('id,name,category,default_price').eq('active',true),
      _sb.from('rfid_products').select('catalog_id').eq('event_id',eventId)
    ]);
    if(catErr) return; // tabla no existe aún — ignorar silenciosamente
    const existingIds=new Set((existing||[]).map(p=>p.catalog_id).filter(Boolean));
    const missing=(catalog||[]).filter(c=>!existingIds.has(c.id));
    if(!missing.length) return;
    await _sb.from('rfid_products').upsert(
      missing.map((c,i)=>({
        event_id:   eventId,
        catalog_id: c.id,
        name:       c.name,
        category:   c.category,
        price:      c.default_price||0,
        stock:      0,
        active:     false,
        sort_order: i,
      })),
      {onConflict:'event_id,catalog_id', ignoreDuplicates:true}
    );
  } catch(e) {
    // Tabla catálogo no existe — no hacer nada, funcionar con rfid_products directo
    console.log('syncCatalogToEvent: catálogo no disponible, usando rfid_products directo');
  }
}

async function submitAddCatalogProduct(){
  const nombre = document.getElementById('mp-nombre')?.value?.trim();
  const precio = parseFloat(document.getElementById('mp-precio')?.value)||0;
  const cat    = document.getElementById('mp-cat')?.value||'General';
  const err    = document.getElementById('modal-err');
  if(!nombre){ err.textContent='El nombre es obligatorio'; err.style.display='block'; return; }
  const btn = document.querySelector('#modal-box .btn-p');
  if(btn){ btn.disabled=true; btn.textContent='Creando…'; }

  // 1. Insertar en catálogo maestro
  const{data:catItem, error:catErr}=await _sb.from('rfid_products_catalog').insert({
    name:nombre, category:cat, default_price:precio, active:true
  }).select().single();

  if(catErr){
    // Si la tabla no existe, fallback: crear solo en rfid_products de todos los eventos
    if(catErr.code==='42P01'){
      await submitAddProduct_fallback(nombre, precio, cat, err, btn);
      return;
    }
    err.textContent='Error catálogo: '+catErr.message; err.style.display='block';
    if(btn){btn.disabled=false;btn.textContent='Crear en catálogo';} return;
  }

  // 2. Crear instancia inactiva en todos los eventos existentes
  // Usamos upsert con ignoreDuplicates para evitar duplicados si el trigger SQL ya actuó
  const{data:eventos}=await _sb.from('events').select('id')
    .in('estado',['publicado','confirmado','produccion','borrador','finalizado']);
  const eventosIds=(eventos||[]).map(e=>e.id);

  if(eventosIds.length){
    await _sb.from('rfid_products').upsert(
      eventosIds.map((eid,i)=>({
        event_id:   eid,
        catalog_id: catItem.id,
        name:       nombre,
        category:   cat,
        price:      precio,
        stock:      0,
        active:     false,
        sort_order: 9999+i,
      })),
      {onConflict:'event_id,catalog_id', ignoreDuplicates:true}
    );
  }

  closeModal();
  toast(`"${nombre}" añadido al catálogo — inactivo en ${eventosIds.length} evento(s) ✓`);
  await loadProducts();
  renderProducts(document.getElementById('page-content'));
}

async function loadAccessStats(){
  if(!selectedEvent) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const{data:logs}=await _sb.from('rfid_access_log')
    .select('direction,created_at,rfid_wristbands(holder_name,uid)')
    .eq('event_id',selectedEvent.id)
    .gte('created_at',today.toISOString())
    .order('created_at',{ascending:false})
    .limit(50);
  if(!logs) return;
  const entries=logs.filter(l=>l.direction==='in').length;
  const exits=logs.filter(l=>l.direction==='out').length;
  const inside=Math.max(0,entries-exits);
  const elIn=document.getElementById('acc-inside');
  const elEnt=document.getElementById('acc-entries');
  const elEx=document.getElementById('acc-exits');
  if(elIn) elIn.textContent=inside;
  if(elEnt) elEnt.textContent=entries;
  if(elEx) elEx.textContent=exits;
  const logEl=document.getElementById('acc-log');
  if(logEl&&logs.length>0){
    logEl.innerHTML=logs.slice(0,20).map(l=>{
      const isIn=l.direction==='in';
      const name=l.rfid_wristbands?.holder_name||l.rfid_wristbands?.uid||'—';
      const time=new Date(l.created_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      return `<div class="acc-log-item"><div class="acc-dir ${isIn?'in':'out'}">${isIn?'↗️':'↙️'}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${name}</div><div style="font-size:11px;color:var(--muted)">${time}</div></div><span class="badge ${isIn?'b-green':'b-blue'}">${isIn?'ENTRADA':'SALIDA'}</span></div>`;
    }).join('');
  }
}

async function onAccessScan(uid){
  const{data:wb}=await _sb.from('rfid_wristbands').select('*').eq('uid',uid).maybeSingle();
  if(!wb){showAccessResult(false,'NO REGISTRADA','UID: '+uid);return;}
  if(wb.status!=='active'){showAccessResult(false,'BLOQUEADA',wb.holder_name||uid);return;}

  // Obtener TODOS los registros de esta pulsera en este evento
  const{data:logs}=await _sb.from('rfid_access_log')
    .select('direction,created_at')
    .eq('wristband_id',wb.id)
    .eq('event_id',selectedEvent?.id)
    .order('created_at',{ascending:true});

  const entradas=(logs||[]).filter(l=>l.direction==='in').length;
  const salidas =(logs||[]).filter(l=>l.direction==='out').length;

  // Lógica: 1 entrada + 1 salida máximo por evento
  if(entradas>=1 && salidas>=1){
    // Ciclo completo — no permitir más
    showAccessResult(false,'YA REGISTRADA',wb.holder_name||uid);
    return;
  }

  // Si ya entró pero aún no salió → registrar salida
  // Si no ha entrado → registrar entrada
  const dir = entradas===0 ? 'in' : 'out';

  await _sb.from('rfid_access_log').insert({
    wristband_id:wb.id,
    event_id:selectedEvent?.id,
    direction:dir,
    gate:'Principal',
    operator:userProfile.nombre
  });

  showAccessResult(true, dir==='in'?'✅ ENTRADA':'🔵 SALIDA', wb.holder_name||uid, wb.balance);
  setTimeout(()=>loadAccessStats(),500);
}

function showAccessResult(ok,title,name='',balance=null){
  const d=document.createElement('div');
  const isWarn = title.includes('YA REGISTRADA');
  d.className='access-full '+(isWarn?'warn-screen':ok?'granted':'denied');
  d.innerHTML=`
    <div style="font-size:80px">${isWarn?'⚠️':ok?(title.includes('ENTRADA')?'🟢':'🔵'):'🔴'}</div>
    <div class="access-text" style="color:${isWarn?'var(--warn)':ok?(title.includes('ENTRADA')?'var(--success)':'var(--a3)'):'var(--danger)'}">${title}</div>
    <div class="access-sub">${name}</div>
    ${isWarn?'<div class="access-sub" style="margin-top:8px;font-size:14px">Esta pulsera ya completó entrada y salida en este evento</div>':''}
    ${!isWarn&&balance!==null?`<div class="access-balance">Saldo: ${fmt(balance)}€</div>`:''}`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
  if(navigator.vibrate) navigator.vibrate(isWarn?[100,50,100]:ok?100:[200,100,200]);
  setTimeout(()=>d.remove(), isWarn?3500:2800);
}

  const wbs=wR.data||[],txs=tR.data||[],accs=aR.data||[];
  const totalBal=wbs.reduce((s,w)=>s+parseFloat(w.balance||0),0);
  const activeWB=wbs.filter(w=>w.status==='active').length;
  const totalTop=txs.filter(t=>t.type==='topup').reduce((s,t)=>s+parseFloat(t.amount),0);
  const totalPur=txs.filter(t=>t.type==='purchase').reduce((s,t)=>s+Math.abs(parseFloat(t.amount)),0);
  const inside=Math.max(0,accs.filter(a=>a.direction==='in').length-accs.filter(a=>a.direction==='out').length);
  pc.innerHTML=`
    <div class="g3 mb24">
      <div class="card" style="text-align:center"><div class="stat-lbl">Saldo en circulación</div><div class="stat-val" style="color:var(--a1)">${fmt(totalBal)}€</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Total recargado</div><div class="stat-val" style="color:var(--success)">${fmt(totalTop)}€</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Total consumido</div><div class="stat-val" style="color:var(--a2)">${fmt(totalPur)}€</div></div>
    </div>
    <div class="g3 mb24">
      <div class="card" style="text-align:center"><div class="stat-lbl">Pulseras activas</div><div class="stat-val" style="color:var(--a3)">${activeWB}</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Transacciones</div><div class="stat-val">${txs.length}</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Aforo actual</div><div class="stat-val" style="color:var(--warn)">${inside}</div></div>
    </div>`;
}

function confirmDeleteProduct(id, name){
  // Modal de confirmación en vez de confirm() nativo
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-title">🗑️ Eliminar producto</div>
    <div class="modal-sub">¿Seguro que quieres eliminar <strong style="color:var(--txt)">${name}</strong>? No se puede deshacer.</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-g" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" style="flex:2" onclick="deleteProduct('${id}')">Sí, eliminar</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

async function deleteProduct(id){
  closeModal();
  const{error}=await _sb.from('rfid_products').delete().eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  toast('Producto eliminado');
  await loadProducts();
  renderProducts(document.getElementById('page-content'));
}

function renderConfig(pc){
  pc.innerHTML=`<div class="g2">
    <div class="card">
      <div class="card-title">Evento activo</div>
      <select class="form-select" onchange="changeEvent(this.value)">
        ${allEvents.map(e=>`<option value="${e.id}" ${selectedEvent?.id===e.id?'selected':''}>${e.nombre}</option>`).join('')}
      </select>
      <div style="font-size:12px;color:var(--muted)">Productos, pulseras y transacciones se filtran por evento.</div>
    </div>
    <div class="card">
      <div class="card-title">NFC</div>
      <div class="s-status" style="margin-bottom:12px">
        <span class="s-status-dot ${nfcSupported?'on':'off'}"></span>
        <span>${nfcSupported?'Web NFC activo':'Web NFC no disponible — usa UID manual'}</span>
      </div>
      ${!nfcSupported?'<div style="padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--warn)">⚠️ Web NFC requiere Chrome en Android con HTTPS.</div>':''}
      <button class="btn btn-g btn-full" style="margin-top:12px" onclick="initNFC()">Reintentar NFC</button>
    </div>
  </div>`;
}

function changeEvent(id){
  selectedEvent=allEvents.find(e=>e.id===id);
  document.getElementById('tb-event').textContent=selectedEvent?.nombre||'Sin evento';
  loadPOS(); loadProducts();
  toast('Evento: '+selectedEvent?.nombre);
}

// ════════════════════════════════════════
//  RESULT OVERLAY
// ════════════════════════════════════════
function showResult(type,emoji,title,sub){
  const d=document.createElement('div');
  d.id='result-overlay'; d.className='result-overlay '+type;
  d.innerHTML=`<div class="result-box ${type}"><div class="result-emoji">${emoji}</div><div class="result-title">${title}</div><div class="result-sub">${sub||''}</div></div>`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
  if(navigator.vibrate) navigator.vibrate(type==='success'?100:[200,100,200]);
}
function hideResult(){document.getElementById('result-overlay')?.remove();}

<script src="lib/device-manager.js"></script>
<script>
  // Auto-configuración del POS
  let deviceManager = null

  async function initDeviceManager() {
    try {
      deviceManager = new InOutDeviceManager({
        deviceType: 'pos',
        appVersion: '1.2.0', // Tu versión actual
        supabaseClient: _sb, // Cliente Supabase que ya tienes
        
        onConfigLoaded: async (device) => {
          console.log('📱 POS configurado:', device)
          
          // Auto-cargar evento asignado
          if (device.event_id) {
            const { data: event } = await _sb
              .from('events')
              .select('*')
              .eq('id', device.event_id)
              .single()
            
            if (event) {
              selectedEvent = event
              console.log(`🎪 Evento asignado: ${event.name}`)
            }
          }
          
          // Aplicar ubicación
          if (device.location) {
            document.title = `POS - ${device.location}`
          }
        },
        
        onCommandReceived: async (cmd, result) => {
          console.log('📥 Comando ejecutado:', cmd.command)
          alert(`Comando remoto ejecutado: ${cmd.command}`)
        }
      })
      
      await deviceManager.initialize()
      console.log('✅ Device Manager iniciado')
      
    } catch (error) {
      console.error('❌ Error Device Manager:', error)
    }
  }

  // Iniciar cuando esté listo
  window.addEventListener('DOMContentLoaded', async () => {
    await new Promise(r => setTimeout(r, 1000))
    await initDeviceManager()
  })
  
</script>
</script>
