<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut ┬Ę RFID System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f;--surf:#0d0d1a;--card:#111120;--border:#1c1c2e;
      --a1:#c8ff00;--a2:#ff3cac;--a3:#00d4ff;
      --txt:#e6e6f0;--muted:#60607a;--r:14px;
      --success:#00e676;--danger:#ff1744;--warn:#ffab00;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);background:var(--bg);overflow:hidden;touch-action:manipulation;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .app{display:flex;height:100vh;height:100dvh;}
    .sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .topbar{height:52px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
    .page{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}
    .s-logo{padding:18px 16px;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;border-bottom:1px solid var(--border);}
    .s-logo small{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:10px;color:var(--a3);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;}
    .logo-dot{color:var(--a1);}
    .s-nav{flex:1;padding:10px 0;overflow-y:auto;}
    .s-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;color:var(--muted);font-size:14px;border-left:3px solid transparent;transition:all .15s;user-select:none;}
    .s-item:active{background:rgba(255,255,255,.05);}
    .s-item.active{color:var(--a1);border-left-color:var(--a1);background:rgba(200,255,0,.05);}
    .s-item .icon{font-size:18px;width:24px;text-align:center;}
    .s-sec{padding:14px 16px 6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
    .s-bottom{padding:12px 16px;border-top:1px solid var(--border);}
    .s-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
    .s-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .s-status-dot.on{background:var(--success);box-shadow:0 0 8px rgba(0,230,118,.5);}
    .s-status-dot.off{background:var(--danger);}
    .tb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .tb-event{font-size:12px;color:var(--a3);padding:4px 10px;border-radius:6px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);}
    .tb-user{font-size:12px;color:var(--muted);}
    .burger{display:none;background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;padding:4px;}
    .nfc-scan{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
    .nfc-ring{width:180px;height:180px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;transition:all .3s;}
    .nfc-ring.scanning{border-color:var(--a3);animation:nfcPulse 2s ease-in-out infinite;}
    .nfc-ring.success{border-color:var(--success);background:rgba(0,230,118,.06);}
    .nfc-ring.error{border-color:var(--danger);background:rgba(255,23,68,.06);}
    .nfc-ring .emoji{font-size:52px;}
    .nfc-label{margin-top:16px;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
    .nfc-sub{color:var(--muted);font-size:13px;margin-top:6px;}
    @keyframes nfcPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.3)}50%{box-shadow:0 0 0 20px rgba(0,212,255,0)}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
    .card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
    .stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;}
    .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;transition:all .12s;user-select:none;min-height:48px;white-space:nowrap;}
    .btn:active{transform:scale(.96);opacity:.85;}
    .btn-p{background:var(--a1);color:#000;}
    .btn-danger{background:rgba(255,23,68,.12);color:var(--danger);border:1px solid rgba(255,23,68,.2);}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-g:active{border-color:var(--a1);color:var(--a1);}
    .btn-full{width:100%;}
    .btn-lg{padding:18px 32px;font-size:17px;border-radius:14px;min-height:56px;}
    .topup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
    .topup-btn{padding:20px;border-radius:14px;background:var(--card);border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
    .topup-btn:active,.topup-btn.selected{border-color:var(--a1);background:rgba(200,255,0,.06);}
    .topup-btn .amount{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--a1);}
    .pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
    .pos-item{padding:16px 12px;border-radius:12px;background:var(--card);border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .12s;user-select:none;position:relative;}
    .pos-item:active{transform:scale(.95);}
    .pos-item.in-cart{border-color:var(--a1);background:rgba(200,255,0,.06);}
    .pos-item .p-name{font-size:14px;font-weight:500;margin-bottom:6px;}
    .pos-item .p-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--a1);}
    .cart-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04);}
    .cart-row:last-of-type{border-bottom:none;}
    .cart-total{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--a1);}
    .form-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
    .form-input,.form-select{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:14px;min-height:48px;}
    .form-input:focus,.form-select:focus{border-color:var(--a1);}
    .result-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:500;animation:fadeIn .2s ease;}
    .result-overlay.success{background:rgba(0,230,118,.12);}
    .result-overlay.error{background:rgba(255,23,68,.12);}
    .result-box{text-align:center;padding:40px;border-radius:20px;background:var(--card);border:2px solid;min-width:300px;}
    .result-box.success{border-color:var(--success);}
    .result-box.error{border-color:var(--danger);}
    .result-emoji{font-size:64px;margin-bottom:16px;}
    .result-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
    .result-sub{font-size:15px;color:var(--muted);}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 50% 35% at 50% 0%,rgba(200,255,0,.07) 0%,transparent 60%);}
    .login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;}
    .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:4px;}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
    .b-green{background:rgba(0,230,118,.12);color:var(--success);}
    .b-red{background:rgba(255,23,68,.12);color:var(--danger);}
    .b-blue{background:rgba(0,212,255,.12);color:var(--a3);}
    .b-gray{background:rgba(107,107,136,.15);color:var(--muted);}
    .b-yellow{background:rgba(255,171,0,.12);color:var(--warn);}
    .balance-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--a1);text-align:center;line-height:1;}
    .balance-label{text-align:center;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
    .access-full{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:600;animation:fadeIn .15s ease;gap:12px;}
    .access-full.granted{background:rgba(0,40,10,.96);}
    .access-full.denied{background:rgba(50,0,0,.96);}
    .access-text{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;text-align:center;padding:0 24px;}
    .access-sub{font-size:16px;color:rgba(255,255,255,.5);text-align:center;}
    .access-balance{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--a1);}
    .access-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
    .acc-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
    .acc-stat .val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
    .acc-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
    .acc-log{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .acc-log-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    .acc-log-item:last-child{border-bottom:none;}
    .acc-dir{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .acc-dir.in{background:rgba(0,230,118,.12);}
    .acc-dir.out{background:rgba(0,212,255,.12);}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    .mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}
    .tbl-wrap{overflow-x:auto;border-radius:10px;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 24px;font-size:14px;z-index:1000;transition:transform .3s;white-space:nowrap;font-weight:500;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    /* ŌöĆŌöĆ MODAL INTEGRADO (reemplaza prompt/confirm nativos) ŌöĆŌöĆ */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:900;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
    .modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}

    /* PIN pad dentro del modal */
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:16px 0;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
    .pin-dot.filled{background:var(--a1);border-color:var(--a1);}
    .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
    .pin-key{padding:16px;border-radius:12px;background:var(--surf);border:1px solid var(--border);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;cursor:pointer;text-align:center;transition:background .1s;user-select:none;}
    .pin-key:active{background:rgba(200,255,0,.1);}
    .pin-key.empty{opacity:0;pointer-events:none;}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;height:100%;z-index:300;transform:translateX(-100%);transition:transform .25s;width:260px;}
      .sidebar.open{transform:translateX(0);}
      .burger{display:flex!important;}
      .g2,.g3,.access-stats{grid-template-columns:1fr;}
      .balance-big{font-size:40px;}
      .nfc-ring{width:140px;height:140px;}
      .nfc-ring .emoji{font-size:40px;}
      .topup-btn .amount{font-size:22px;}
    }
    @media(min-width:769px){.burger{display:none;}}
  </style>
</head>

function adminPinKey(k){
  if(k==='Ōī½'){ _pinAdminBuffer=_pinAdminBuffer.slice(0,-1); }
  else if(_pinAdminBuffer.length < 4){ _pinAdminBuffer += k; }
  // Actualizar dots
  for(let i=0;i<4;i++){
    const d=document.getElementById('admpd'+i);
    if(d){ d.className='pin-dot'+(i<_pinAdminBuffer.length?' filled':''); }
  }
  if(_pinAdminBuffer.length === 4){
    setTimeout(()=>{
      if(_pinAdminBuffer === '0607'){
        closeModal();
        if(window._adminPinCallback) window._adminPinCallback();
        window._adminPinCallback = null;
      } else {
        _pinAdminBuffer = '';
        for(let i=0;i<4;i++){const d=document.getElementById('admpd'+i);if(d)d.className='pin-dot';}
        // Shake
        const box = document.getElementById('modal-box');
        if(box){
          box.style.transition='transform .08s';
          box.style.transform='translateX(8px)';
          setTimeout(()=>box.style.transform='translateX(-8px)',80);
          setTimeout(()=>box.style.transform='translateX(4px)',160);
          setTimeout(()=>box.style.transform='translateX(0)',240);
        }
        toast('Ōøö PIN incorrecto');
      }
    }, 150);
  }
}

async function initNFC(){
  const dot=document.getElementById('nfc-status-dot');
  const txt=document.getElementById('nfc-status-text');
  if(!('NDEFReader' in window)){
    nfcSupported=false; dot.className='s-status-dot off'; txt.textContent='NFC: No disponible'; return;
  }
  nfcSupported=true;
  try{
    nfcReader=new NDEFReader();
    await nfcReader.scan();
    nfcReader.onreading      = ev => handleNFCScan(ev.serialNumber.replace(/:/g,'').toUpperCase());
    nfcReader.onreadingerror = ()  => toast('Error leyendo NFC');
    dot.className='s-status-dot on'; txt.textContent='NFC: Activo';
  }catch(e){
    dot.className='s-status-dot off'; txt.textContent='NFC: Permiso denegado'; nfcSupported=false;
  }
}

function handleNFCScan(uid){
  if(isDuplicateScan(uid)) return;
  lastScannedUID=uid;
  if(navigator.vibrate) navigator.vibrate(100);
  if(currentPage==='pos')          onPOSScan(uid);
  else if(currentPage==='topup')   onTopupScan(uid);
  else if(currentPage==='register')onRegisterScan(uid);
  else if(currentPage==='access')  onAccessScan(uid);
  else if(currentPage==='balance') onBalanceScan(uid);
  else toast('UID: '+uid);
}

function addToCart(id){posCart[id]=(posCart[id]||0)+1;updateCartUI();}
function removeFromCart(id){if(posCart[id])posCart[id]--;if(posCart[id]<=0)delete posCart[id];updateCartUI();}
function clearCart(){posCart={};updateCartUI();document.getElementById('pos-scan-area').style.display='none';document.getElementById('pos-cart-card').style.display='block';}
function getCartTotal(){let t=0;for(const[id,qty]of Object.entries(posCart)){const p=posProducts.find(x=>x.id===id);if(p)t+=p.price*qty;}return t;}

function updateCartUI(){
  const items=document.getElementById('pos-cart-items');
  const totalEl=document.getElementById('pos-cart-total');
  const entries=Object.entries(posCart).filter(([,q])=>q>0);
  if(!entries.length){
    items.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Selecciona productos</div>';
    totalEl.textContent='0,00Ōé¼'; return;
  }
  items.innerHTML=entries.map(([id,qty])=>{
    const p=posProducts.find(x=>x.id===id); if(!p)return'';
    return `<div class="cart-row"><div style="display:flex;align-items:center;gap:10px"><button class="btn btn-g" style="width:32px;height:32px;min-height:32px;font-size:16px;padding:0;border-radius:8px" onclick="removeFromCart('${id}')">ŌłÆ</button><span>${p.name} ├Ś${qty}</span></div><span style="font-weight:600;color:var(--a1)">${fmt(p.price*qty)}Ōé¼</span></div>`;
  }).join('');
  totalEl.textContent=fmt(getCartTotal())+'Ōé¼';
  document.querySelectorAll('.pos-item').forEach(el=>el.classList.remove('in-cart'));
  for(const id of Object.keys(posCart)) document.getElementById('pos-p-'+id)?.classList.add('in-cart');
}

function startPOSCharge(){
  const t=getCartTotal();
  if(t<=0){toast('A├▒ade productos primero');return;}
  document.getElementById('pos-cart-card').style.display='none';
  document.getElementById('pos-scan-area').style.display='flex';
  document.getElementById('pos-scan-sub').textContent=`Total: ${fmt(t)}Ōé¼ ŌĆö Esperando pulsera...`;
}

function cancelPOSCharge(){
  document.getElementById('pos-scan-area').style.display='none';

}

async function onPOSScan(uid){
  const scanArea=document.getElementById('pos-scan-area');
  if(!scanArea||scanArea.style.display==='none') return;
  const total=getCartTotal(); if(total<=0)return;
  const ring=document.getElementById('pos-nfc-ring');
  const sub=document.getElementById('pos-scan-sub');
  ring.className='nfc-ring'; sub.textContent='Procesando...';

  const{data:wb}=await _sb.from('rfid_wristbands').select('*').eq('uid',uid).single();
  if(!wb){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='ŌØī';sub.textContent='Pulsera no registrada';setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='­¤ōĪ';sub.textContent=`Total: ${fmt(total)}Ōé¼ ŌĆö Esperando pulsera...`;},2000);return;}
  if(wb.status!=='active'){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='­¤Ü½';sub.textContent='Pulsera bloqueada';setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='­¤ōĪ';sub.textContent=`Total: ${fmt(total)}Ōé¼ ŌĆö Esperando pulsera...`;},2000);return;}
  if(parseFloat(wb.balance)<total){ring.className='nfc-ring error';ring.querySelector('.emoji').textContent='­¤ÆĖ';sub.textContent=`Saldo insuficiente: ${fmt(wb.balance)}Ōé¼ (necesita ${fmt(total)}Ōé¼)`;if(navigator.vibrate)navigator.vibrate([200,100,200]);setTimeout(()=>{ring.className='nfc-ring scanning';ring.querySelector('.emoji').textContent='­¤ōĪ';sub.textContent=`Total: ${fmt(total)}Ōé¼ ŌĆö Esperando pulsera...`;},3000);return;}

  const newBal=parseFloat(wb.balance)-total;
  const desc=Object.entries(posCart).map(([id,qty])=>{const p=posProducts.find(x=>x.id===id);return p?p.name+' x'+qty:'';}).filter(Boolean).join(', ');
  await _sb.from('rfid_wristbands').update({balance:newBal,total_spent:parseFloat(wb.total_spent||0)+total,last_used_at:new Date().toISOString()}).eq('id',wb.id);
  await _sb.from('rfid_transactions').insert({wristband_id:wb.id,event_id:selectedEvent?.id,type:'purchase',amount:-total,balance_after:newBal,description:desc,point_of_sale:'POS',operator:userProfile.nombre,payment_method:'cashless'});
  showResult('success','Ō£ģ','Cobrado: '+fmt(total)+'Ōé¼','Saldo restante: '+fmt(newBal)+'Ōé¼ ┬Ę '+(wb.holder_name||''));
  posCart={};

function startSumUpTopup(){
  if(!topupWristband||topupAmount<=0)return;
  const btn=document.getElementById('topup-sumup-btn');
  btn.disabled=true; btn.textContent='Creando pago...';
  fetch('https://inout-api.vercel.app/api/rfid/topup',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({wristband_id:topupWristband.id,uid:topupWristband.uid,amount:topupAmount,event_id:selectedEvent?.id,operator:userProfile.nombre})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.error){toast('Error: '+data.error);btn.disabled=false;btn.textContent='Cobrar con SumUp';return;}
    sessionStorage.setItem('topup_sumup_id',data.sumup_checkout_id);
    sessionStorage.setItem('topup_wristband_id',topupWristband.id);
    sessionStorage.setItem('topup_amount',String(topupAmount));
    sessionStorage.setItem('topup_ref',data.reference);
    const isAndroid=/Android/i.test(navigator.userAgent);
    if(isAndroid){
      const fee=Math.round(topupAmount*3.5)/100;
      window.location.href='sumupmerchant://pay/1.0'
        +'?affiliate-key=sup_afk_Yw5nEDC5oRf34ycz09JFqPkR1DLQR5MH'
        +'&app-id=com.inoutmedia.valid'
        +'&total='+(topupAmount+fee).toFixed(2)
        +'&currency=EUR'
        +'&title='+encodeURIComponent('Recarga '+(topupWristband.holder_name||topupWristband.uid))
        +'&foreign-tx-id='+data.reference
        +'&skip-screen-success=true'
        +'&callback='+encodeURIComponent('https://inout-valid.vercel.app/#topup');
    } else {
      window.open(data.checkout_url,'_blank');
    }
    document.getElementById('page-content').innerHTML=`<div style="max-width:500px;margin:40px auto;text-align:center"><div class="card"><div style="font-size:48px;margin-bottom:16px">­¤Æ│</div><div style="font-family:Syne;font-size:24px;font-weight:700;margin-bottom:8px">Pago en proceso</div><div style="font-size:15px;color:var(--muted);margin-bottom:8px">${topupWristband.holder_name||topupWristband.uid}</div><div style="font-family:Syne;font-size:42px;font-weight:800;color:var(--a1);margin:16px 0">${fmt(topupAmount)}Ōé¼</div><div id="topup-verify-status" style="padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;font-size:14px;color:var(--warn)">ŌÅ│ Esperando confirmaci├│n...</div><div style="display:flex;gap:10px;flex-direction:column"><button class="btn btn-p btn-full btn-lg" onclick="checkTopupPayment()">­¤öä Verificar pago</button><button class="btn btn-danger btn-full" onclick="cancelSumUpPayment()">ŌØī Cancelar</button></div></div></div>`;

  })
  .catch(err=>{toast('Error: '+err.message);btn.disabled=false;btn.textContent='Cobrar con SumUp';});
}

function checkTopupPayment(){
  const sumupId=sessionStorage.getItem('topup_sumup_id');
  const wbId=sessionStorage.getItem('topup_wristband_id');
  const amount=sessionStorage.getItem('topup_amount');
  const ref=sessionStorage.getItem('topup_ref');
  if(!sumupId||!wbId)return;
  const el=document.getElementById('topup-verify-status');
  if(el)el.innerHTML='­¤öä Verificando...';
  fetch(`https://inout-api.vercel.app/api/rfid/verify-topup?wristband=${wbId}&amount=${amount}&ref=${ref}&sumup_id=${sumupId}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.status==='completed'||data.status==='already_completed'){
      if(topupCheckInterval){clearInterval(topupCheckInterval);topupCheckInterval=null;}
      ['topup_sumup_id','topup_wristband_id','topup_amount','topup_ref'].forEach(k=>sessionStorage.removeItem(k));
      showResult('success','­¤Æ░','+'+fmt(parseFloat(amount))+'Ōé¼ recargados','Nuevo saldo: '+fmt(data.balance)+'Ōé¼ ┬Ę '+(data.holder_name||''));
      topupWristband=null;topupAmount=0;
      setTimeout(()=>{hideResult();renderTopup(document.getElementById('page-content'));},2500);
    }else{
      if(el)el.innerHTML='ŌÅ│ Pago pendiente ('+(data.sumup_status||'procesando')+')<br><span style="font-size:12px;color:var(--muted)">Se verifica cada 5 seg.</span>';
    }
  })
  .catch(()=>{if(el)el.textContent='ŌÜĀ’ĖÅ Error verificando. Reintenta.';});
}

function cancelSumUpPayment(){
  if(topupCheckInterval){clearInterval(topupCheckInterval);topupCheckInterval=null;}
  ['topup_sumup_id','topup_wristband_id','topup_amount','topup_ref'].forEach(k=>sessionStorage.removeItem(k));
  toast('Recarga cancelada');topupWristband=null;topupAmount=0;
  renderTopup(document.getElementById('page-content'));
}

async function loadAccessStats(){
  if(!selectedEvent) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const{data:logs}=await _sb.from('rfid_access_log')
    .select('direction,created_at,rfid_wristbands(holder_name,uid)')
    .eq('event_id',selectedEvent.id)
    .gte('created_at',today.toISOString())
    .order('created_at',{ascending:false})
    .limit(50);
  if(!logs) return;
  const entries=logs.filter(l=>l.direction==='in').length;
  const exits=logs.filter(l=>l.direction==='out').length;
  const inside=Math.max(0,entries-exits);
  const elIn=document.getElementById('acc-inside');
  const elEnt=document.getElementById('acc-entries');
  const elEx=document.getElementById('acc-exits');
  if(elIn) elIn.textContent=inside;
  if(elEnt) elEnt.textContent=entries;
  if(elEx) elEx.textContent=exits;
  const logEl=document.getElementById('acc-log');
  if(logEl&&logs.length>0){
    logEl.innerHTML=logs.slice(0,20).map(l=>{
      const isIn=l.direction==='in';
      const name=l.rfid_wristbands?.holder_name||l.rfid_wristbands?.uid||'ŌĆö';
      const time=new Date(l.created_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      return `<div class="acc-log-item"><div class="acc-dir ${isIn?'in':'out'}">${isIn?'ŌåŚ’ĖÅ':'ŌåÖ’ĖÅ'}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${name}</div><div style="font-size:11px;color:var(--muted)">${time}</div></div><span class="badge ${isIn?'b-green':'b-blue'}">${isIn?'ENTRADA':'SALIDA'}</span></div>`;
    }).join('');
  }
}

async function onAccessScan(uid){
  const{data:wb}=await _sb.from('rfid_wristbands').select('*').eq('uid',uid).maybeSingle();
  if(!wb){showAccessResult(false,'NO REGISTRADA','UID: '+uid);return;}
  if(wb.status!=='active'){showAccessResult(false,'BLOQUEADA',wb.holder_name||uid);return;}
  const{data:lastLog}=await _sb.from('rfid_access_log').select('direction').eq('wristband_id',wb.id).eq('event_id',selectedEvent?.id).order('created_at',{ascending:false}).limit(1).maybeSingle();
  const dir=(!lastLog||lastLog.direction==='out')?'in':'out';
  await _sb.from('rfid_access_log').insert({wristband_id:wb.id,event_id:selectedEvent?.id,direction:dir,gate:'Principal',operator:userProfile.nombre});
  showAccessResult(true,dir==='in'?'Ō£ģ ENTRADA':'­¤öĄ SALIDA',wb.holder_name||uid,wb.balance);
  setTimeout(()=>loadAccessStats(),500);
}

function showAccessResult(ok,title,name='',balance=null){
  const d=document.createElement('div');
  d.className='access-full '+(ok?'granted':'denied');
  d.innerHTML=`
    <div style="font-size:80px">${ok?(title.includes('ENTRADA')?'­¤¤ó':'­¤öĄ'):'­¤ö┤'}</div>
    <div class="access-text" style="color:${ok?(title.includes('ENTRADA')?'var(--success)':'var(--a3)'):'var(--danger)'}">${title}</div>
    <div class="access-sub">${name}</div>
    ${balance!==null?`<div class="access-balance">Saldo: ${fmt(balance)}Ōé¼</div>`:''}`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
  if(navigator.vibrate) navigator.vibrate(ok?100:[200,100,200]);
  setTimeout(()=>d.remove(),2800);
}

async function renderDashboard(pc){
  pc.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Cargando...</div>';
  const eid=selectedEvent?.id;
  const[wR,tR,aR]=await Promise.all([
    _sb.from('rfid_wristbands').select('balance,status').eq('event_id',eid),
    _sb.from('rfid_transactions').select('type,amount').eq('event_id',eid),
    _sb.from('rfid_access_log').select('direction').eq('event_id',eid)
  ]);
  const wbs=wR.data||[],txs=tR.data||[],accs=aR.data||[];
  const totalBal=wbs.reduce((s,w)=>s+parseFloat(w.balance||0),0);
  const activeWB=wbs.filter(w=>w.status==='active').length;
  const totalTop=txs.filter(t=>t.type==='topup').reduce((s,t)=>s+parseFloat(t.amount),0);
  const totalPur=txs.filter(t=>t.type==='purchase').reduce((s,t)=>s+Math.abs(parseFloat(t.amount)),0);
  const inside=Math.max(0,accs.filter(a=>a.direction==='in').length-accs.filter(a=>a.direction==='out').length);
  pc.innerHTML=`
    <div class="g3 mb24">
      <div class="card" style="text-align:center"><div class="stat-lbl">Saldo en circulaci├│n</div><div class="stat-val" style="color:var(--a1)">${fmt(totalBal)}Ōé¼</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Total recargado</div><div class="stat-val" style="color:var(--success)">${fmt(totalTop)}Ōé¼</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Total consumido</div><div class="stat-val" style="color:var(--a2)">${fmt(totalPur)}Ōé¼</div></div>
    </div>
    <div class="g3 mb24">
      <div class="card" style="text-align:center"><div class="stat-lbl">Pulseras activas</div><div class="stat-val" style="color:var(--a3)">${activeWB}</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Transacciones</div><div class="stat-val">${txs.length}</div></div>
      <div class="card" style="text-align:center"><div class="stat-lbl">Aforo actual</div><div class="stat-val" style="color:var(--warn)">${inside}</div></div>
    </div>`;
}
